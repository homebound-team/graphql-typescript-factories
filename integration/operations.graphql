# This fragment reproduces factory result assignability when an operation selects __typename
# on a union field. The raw schema type has optional __typename on each concrete union
# member, but operation result types require it when selected, and factory runtime always
# sets it recursively.
fragment SearchResultsDetails on SearchResults {
  result1 {
    __typename
    ... on Author {
      id
      name
    }
    ... on Book {
      name
    }
  }
}

# This fragment reproduces the same assignability issue through a list field. FactoryResult
# must keep array elements typed with required __typename, including through array methods
# like pop().
fragment AuthorBooksDetails on Author {
  books {
    __typename
    name
  }
}

# Covers the Region.children narrowing boundary from the schema fixture. The fragment result
# requires concrete Market typenames, including through array helpers like pop().
fragment RegionChildrenDetails on Region {
  children {
    __typename
    name
  }
}
